project: omni-scoreboard
updated: "2026-06-24"
progress:
  note: "STATUS.md is the living state (authoritative); this file is the forward backlog. As of PRs #1-#56 (A0 orchestration spine + B1 lifecycle cards; round-2 signed off as architecture + lifecycle breadth) much of M3 and the running-app orchestration loop has shipped - see STATUS 'Delivered'. Current work is sequenced round-based (B1.5a -> B1.5b -> A1), not by raw milestone order."
  shipped_milestones: [M0, M1, M2, M4]
  deferred_within_shipped:
    - "M1-003: non-MLB team subclasses (Football/Basketball/Hockey Team) deferred to their league milestones (M6-M9)."
    - "M4-005: priority-driven polling cadence deferred to A1 (typed PollPlan)."
  next: "B1.5a (correctness + lifecycle hardening) -> B1.5b (live-dashboard density + visual integration) -> A1 (appliance cutover); see STATUS 'Next'. Remaining M3 polish folds into B1.5a/b; M5 device UX into A1; M6+ leagues stay deferred (NFL, then PGA before NCAA)."
principles:
  - friends_and_family_scope
  - no_consumer_saas
  - equal_display_profile_support
  - typed_domain_objects_over_primitives
  - free_low_cost_data_by_default
  - fixture_replay_before_visual_polish

display_profiles:
  - id: single_64x32
    physical: "1x1 64x32 panel"
    logical_width: 64
    logical_height: 32
    role: "primary compact family unit"
  - id: stack_64x64
    physical: "2x1 vertical stack of 64x32 panels or native equivalent"
    logical_width: 64
    logical_height: 64
    role: "balanced rich compact layout"
  - id: quad_128x64
    physical: "2x2 matrix of 64x32 panels"
    logical_width: 128
    logical_height: 64
    role: "legacy/rich dashboard"

