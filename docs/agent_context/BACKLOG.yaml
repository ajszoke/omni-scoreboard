      - id: M3-012
        title: "End-of-game winner/loser logic and W/L/S tightening"
        labels: [mlb, rendering, p2]
      - id: M3-013
        title: "Other-game/news ticker during idle/non-active states"
        labels: [ticker, mlb, p2]
      - id: M3-014
        title: "Mid-inning linescore"
        labels: [mlb, rendering, p3]
      - id: M3-015
        title: "K-zone with pitch blips"
        labels: [mlb, rendering, p3]
      - id: M3-016
        title: "Pitching-change transition card"
        labels: [mlb, animation, p3]
      - id: M3-017
        title: "HR stats/arcs experimental card"
        labels: [mlb, fun, p4]
      - id: M3-018
        title: "Leverage-aware preferred-team upranking"
        labels: [mlb, priority, attention, p2]
        notes:
          - "Grade preferred-team games by late-season race leverage (divisional/wildcard) instead of a binary preferred flag: uprank on a sliding per-matchup curve, muffled when the team is out of contention (eliminationNumber 0 => amplitude 0)."
          - "A season/race-leverage input to AttentionPolicy/PriorityScorer (round-2 M6), distinct from the in-game win-probability meter. Established metric = championship Leverage Index (cLI). Free path (data policy: no required paid odds API) = StatsAPI standings (gamesBack, magicNumber, eliminationNumber); optional self-computed playoff-odds Monte Carlo over the remaining schedule."
          - "Origin: the user added the Mets only for a late-2025 Mets+Braves playoff race; the captured legacy config.json hand-encodes preferred.divisions [NL East, NL Wild Card] - the manual version of this. Local memory: leverage-aware-upranking, user-team-prefs."

